<div class="flex items-center gap-1">
  <div class="flex items-center">
    <svg
      *ngFor="let star of stars"
      [ngClass]="[sizeClasses, getStarClass(star), readonly ? 'cursor-default' : 'cursor-pointer hover:scale-110 transition-transform']"
      viewBox="0 0 24 24"
      fill="currentColor"
      (click)="handleStarClick(star)"
    >
      <defs>
        <linearGradient *ngIf="getStarType(star) === 'half'" id="half-gradient-{{ star }}" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="50%" stop-color="currentColor" />
          <stop offset="50%" stop-color="currentColor" stop-opacity="0.3" />
        </linearGradient>
      </defs>
      <path
        *ngIf="getStarType(star) === 'full'"
        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
        fill="currentColor"
      />
      <path
        *ngIf="getStarType(star) === 'half'"
        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77V2z"
        fill="url(#half-gradient-{{ star }})"
      />
      <path
        *ngIf="getStarType(star) === 'empty'"
        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
        fill="currentColor"
        opacity="0.3"
      />
    </svg>
  </div>
  
  <span *ngIf="showCount && reviewCount > 0" class="text-sm text-text-secondary ml-2">
    ({{ reviewCount }})
  </span>
</div>
