<div class="fixed top-20 right-4 z-[9999] flex flex-col items-end">
  <div
    *ngFor="let notification of notifications"
    [class]="getNotificationClass(notification.type)"
    class="animate-slide-in-right"
  >
    <div class="flex items-center gap-3">
      <span class="text-xl font-bold">{{ getIcon(notification.type) }}</span>
      <span class="font-semibold">{{ notification.message }}</span>
    </div>
    <button
      (click)="removeNotification(notification.id)"
      class="ml-4 text-gray-500 hover:text-gray-700 font-bold text-lg"
      aria-label="Close notification"
    >
      ×
    </button>
  </div>
</div>
