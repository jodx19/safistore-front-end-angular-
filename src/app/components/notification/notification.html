<div class="fixed top-24 right-6 z-[9999] flex flex-col items-end gap-3 pointer-events-none">
  <div
    *ngFor="let notification of notifications"
    class="pointer-events-auto rounded-2xl shadow-2xl border backdrop-blur-xl flex items-center gap-4 px-5 py-4 min-w-[320px] max-w-[420px]"
    [class.bg-green-500/15]="notification.type === 'success'"
    [class.border-green-500/30]="notification.type === 'success'"
    [class.text-green-400]="notification.type === 'success'"
    [class.bg-red-500/15]="notification.type === 'error'"
    [class.border-red-500/30]="notification.type === 'error'"
    [class.text-red-400]="notification.type === 'error'"
    [class.bg-yellow-500/15]="notification.type === 'warning'"
    [class.border-yellow-500/30]="notification.type === 'warning'"
    [class.text-yellow-400]="notification.type === 'warning'"
    [class.bg-blue-500/15]="notification.type === 'info'"
    [class.border-blue-500/30]="notification.type === 'info'"
    [class.text-blue-400]="notification.type === 'info'"
    [class.bg-white/10]="!['success','error','warning','info'].includes(notification.type)"
    [class.border-white/10]="!['success','error','warning','info'].includes(notification.type)"
    [class.text-white]="!['success','error','warning','info'].includes(notification.type)"
    class="animate-slide-in-right"
  >
    <span class="text-xl font-bold shrink-0">{{ getIcon(notification.type) }}</span>
    <span class="font-semibold text-sm flex-1 leading-relaxed">{{ notification.message }}</span>
    <button
      (click)="removeNotification(notification.id)"
      class="shrink-0 w-6 h-6 rounded-full hover:bg-white/10 flex items-center justify-center text-lg font-bold transition-colors"
      aria-label="Close notification"
    >
      ×
    </button>
  </div>
</div>
