<div [ngClass]="gridClasses">
  <!-- Loading State -->
  <div *ngIf="loading" class="col-span-full">
    <div class="flex items-center justify-center py-12">
      <app-spinner size="lg" color="primary"></app-spinner>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && products.length === 0" class="col-span-full">
    <div class="text-center py-12">
      <div class="mb-4">
        <svg class="w-16 h-16 mx-auto text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
        </svg>
      </div>
      <h3 class="text-xl font-semibold text-text-primary mb-2">No products found</h3>
      <p class="text-text-secondary">Try adjusting your filters or search terms</p>
    </div>
  </div>

  <!-- Product Cards -->
  <app-product-card
    *ngFor="let product of products"
    [product]="product"
    [showWishlist]="showWishlist"
    [showQuickView]="showQuickView"
    (onWishlistToggle)="handleWishlistToggle($event)"
  ></app-product-card>
</div>
