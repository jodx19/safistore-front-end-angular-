<header class="sticky top-0 z-50 backdrop-blur bg-white/70 border-b border-sky-100/30 shadow-sm">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-4 px-4 py-3 md:py-4">
    <!-- Logo -->
    <a
      (click)="goToHome()"
      class="flex items-center gap-3 cursor-pointer group transition-transform hover:scale-105"
      aria-label="SafiStore Home"
    >
      <div
        class="w-12 h-12 md:w-14 md:h-14 rounded-xl flex items-center justify-center bg-gradient-to-br from-sky-600 via-cyan-500 to-teal-400 shadow-lg shadow-sky-500/30 group-hover:shadow-xl group-hover:shadow-sky-500/40 transition-all duration-300"
      >
        <!-- Professional Shopping Bag SVG Logo -->
        <svg
          class="w-7 h-7 md:w-8 md:h-8 text-white"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <!-- Shopping Bag -->
          <path
            d="M6 2L3 6V20C3 20.5304 3.21071 21.0391 3.58579 21.4142C3.96086 21.7893 4.46957 22 5 22H19C19.5304 22 20.0391 21.7893 20.4142 21.4142C20.7893 21.0391 21 20.5304 21 20V6L18 2H6Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="rgba(255,255,255,0.15)"
          />
          <!-- Bag Handle -->
          <path
            d="M3 6H21"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <!-- Shopping Cart Lines -->
          <path
            d="M8 10V14M16 10V14"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
          <!-- Sparkle/Star for Premium Feel -->
          <circle cx="12" cy="12" r="1.5" fill="currentColor" opacity="0.8" />
        </svg>
      </div>
      <div class="flex flex-col">
        <div class="text-lg md:text-2xl font-extrabold gradient-text leading-none tracking-tight">
          SafiStore
        </div>
        <div class="text-[10px] md:text-xs text-sky-600 font-medium leading-tight -mt-0.5">
          Premium Shopping
        </div>
      </div>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-2">
      <a
        routerLink="/"
        routerLinkActive="bg-sky-100"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-md px-3 py-2 text-sky-700 font-semibold transition hover:bg-sky-50 focus:outline-none focus:ring-2 focus:ring-sky-300"
      >
        Home
      </a>
      <a
        routerLink="/products"
        routerLinkActive="bg-sky-100"
        class="rounded-md px-3 py-2 text-sky-700 font-semibold transition hover:bg-sky-50 focus:outline-none focus:ring-2 focus:ring-sky-300"
      >
        Products
      </a>
      <a
        routerLink="/track"
        routerLinkActive="bg-sky-100"
        class="rounded-md px-3 py-2 text-sky-700 font-semibold transition hover:bg-sky-50 focus:outline-none focus:ring-2 focus:ring-sky-300"
      >
        Track Order
      </a>
    </nav>

    <!-- Search Bar -->
    <div class="hidden lg:flex items-center gap-2">
      <div role="search" class="relative">
        <label for="global-search" class="sr-only">Search products</label>
        <input
          id="global-search"
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search products, brands..."
          class="w-56 md:w-64 rounded-lg px-4 py-2 bg-sky-50 border border-sky-200 text-sky-900 placeholder-sky-400 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:bg-white transition"
        />
        <button
          type="button"
          (click)="search(searchQuery)"
          aria-label="Search"
          class="absolute right-2 top-1/2 -translate-y-1/2 text-sky-600 hover:text-sky-700"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Cart & Auth -->
    <div class="flex items-center gap-3">
      <!-- Cart Icon -->
      <a routerLink="/cart" class="relative group" aria-label="Cart">
        <svg
          class="w-7 h-7 text-sky-700 transition group-hover:scale-110"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2 6h14l-2-6"
          ></path>
        </svg>
        <span
          *ngIf="cartCount > 0"
          class="absolute -right-2 -top-2 flex h-5 w-5 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white"
        >
          {{ cartCount }}
        </span>
      </a>

      <!-- Auth Links (Desktop) -->
      <div class="hidden sm:flex items-center gap-3">
        <ng-container *ngIf="currentUser as user; else loginLink">
          <div class="flex items-center gap-3">
            <div
              class="rounded-full bg-sky-50 text-sky-700 w-9 h-9 flex items-center justify-center font-semibold"
            >
              {{ user.firstName.charAt(0) || 'U' }}
            </div>
            <div class="hidden md:block">
              <p class="text-sm font-semibold text-sky-900 leading-none">
                {{ user.firstName }}
              </p>
              <p *ngIf="user.role === 'admin'" class="text-xs text-sky-600">Admin</p>
            </div>
          </div>

          <a
            *ngIf="user.role === 'admin'"
            (click)="navigateToAdmin()"
            class="rounded-md bg-yellow-400 px-3 py-2 font-bold text-gray-900 hover:bg-yellow-500 cursor-pointer transition transform hover:scale-105"
          >
            Dashboard
          </a>

          <button
            (click)="logout()"
            class="rounded-md bg-red-500 px-3 py-2 font-bold text-white hover:bg-red-600 transition transform hover:scale-105"
          >
            Logout
          </button>
        </ng-container>

        <ng-template #loginLink>
          <a
            routerLink="/login"
            class="rounded-md px-3 py-2 text-sky-700 font-semibold transition hover:bg-sky-50"
          >
            Login
          </a>
          <a
            routerLink="/register"
            class="rounded-md bg-sky-600 px-3 py-2 font-bold text-white hover:bg-sky-700 transition"
          >
            Sign Up
          </a>
        </ng-template>
      </div>

      <!-- Mobile Menu Button -->
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden text-sky-700 p-2 rounded-md hover:bg-sky-50/50 focus:outline-none focus:ring-2 focus:ring-sky-300"
        aria-expanded="{{ showMobileMenu }}"
      >
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16m-7 6h7"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div *ngIf="showMobileMenu" class="md:hidden bg-white border-t border-sky-100 shadow-inner">
    <div class="space-y-2 px-4 py-4">
      <a
        routerLink="/"
        class="block rounded-md px-3 py-2 text-sky-700 font-semibold hover:bg-sky-50"
        >Home</a
      >
      <a
        routerLink="/products"
        class="block rounded-md px-3 py-2 text-sky-700 font-semibold hover:bg-sky-50"
        >Products</a
      >
      <a
        routerLink="/track"
        class="block rounded-md px-3 py-2 text-sky-700 font-semibold hover:bg-sky-50"
        >Track Order</a
      >

      <ng-container *ngIf="currentUser as user; else mobileLoginLink">
        <div class="border-t border-sky-100 pt-3 mt-3">
          <p class="px-3 py-2 font-semibold text-sky-900">{{ user.firstName }}</p>
          <a
            *ngIf="user.role === 'admin'"
            (click)="navigateToAdmin()"
            class="block rounded-md bg-yellow-400 px-3 py-2 text-center font-bold text-gray-900 hover:bg-yellow-500 cursor-pointer"
            >Dashboard</a
          >
          <button
            (click)="logout()"
            class="mt-2 w-full rounded-md bg-red-500 px-3 py-2 font-bold text-white hover:bg-red-600"
          >
            Logout
          </button>
        </div>
      </ng-container>

      <ng-template #mobileLoginLink>
        <div class="border-t border-sky-100 pt-3 mt-3 space-y-2">
          <a
            routerLink="/login"
            class="block rounded-md px-3 py-2 text-sky-700 font-semibold hover:bg-sky-50"
            >Login</a
          >
          <a
            routerLink="/register"
            class="block rounded-md bg-sky-600 px-3 py-2 text-center font-bold text-white hover:bg-sky-700"
            >Sign Up</a
          >
        </div>
      </ng-template>
    </div>
  </div>
</header>
