<!-- SafiStore Navigation -->
<header *ngIf="!isAuthPage" 
  [ngClass]="{
    'bg-bg-card/80 backdrop-blur-xl shadow-lg border-b border-border py-3': isScrolled,
    'bg-transparent py-5': !isScrolled
  }"
  class="fixed top-0 w-full z-50 transition-all duration-500">
  
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-6 px-6 lg:px-8">
    <!-- Logo - Refined Geometric Shield -->
    <a
      (click)="goToHome()"
      class="flex items-center gap-3 cursor-pointer group"
      aria-label="SafiStore Home"
    >
      <!-- Geometric Shield Icon -->
      <div class="relative w-10 h-10">
        <!-- Background glow -->
        <div class="absolute inset-0 bg-gradient-to-br from-accent-purple to-accent-blue rounded-xl rotate-3 group-hover:rotate-6 transition-transform duration-500 opacity-80 shadow-glow"></div>
        <!-- Shield Container -->
        <div class="absolute inset-0 bg-white rounded-xl flex items-center justify-center shadow-sm overflow-hidden">
          <!-- Geometric Shield SVG -->
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6V11C4 16.5 7.5 21 12 22C16.5 21 20 16.5 20 11V6L12 2Z" 
                  stroke="#1A1A2E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M12 6L8 8.5V11.5C8 14.5 9.8 17.2 12 18C14.2 17.2 16 14.5 16 11.5V8.5L12 6Z" 
                  fill="#6C3FFF"/>
            <path d="M12 10L10.5 11.5L12 13L13.5 11.5L12 10Z" 
                  fill="#1A1A2E"/>
          </svg>
        </div>
        <!-- Glow dot -->
        <div class="absolute -top-1 -right-1 w-3 h-3 bg-accent rounded-full animate-pulse-glow shadow-glow-accent"></div>
      </div>
      <span class="text-2xl font-black text-text-primary tracking-tight font-inter">
        Safi<span class="text-accent-purple">Store</span>
      </span>
    </a>

    <!-- Desktop Navigation - Ultra Clean -->
    <nav class="hidden md:flex items-center gap-2">
      <a
        routerLink="/"
        routerLinkActive="bg-accent-purple/20 text-accent-purple font-bold"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded-full px-5 py-2.5 text-text-secondary font-semibold text-sm transition-all duration-300 hover:bg-accent-purple/10 hover:text-text-primary"
      >
        Home
      </a>
      <a
        routerLink="/products"
        routerLinkActive="bg-accent-purple/20 text-accent-purple font-bold"
        class="rounded-full px-5 py-2.5 text-text-secondary font-semibold text-sm transition-all duration-300 hover:bg-accent-purple/10 hover:text-text-primary"
      >
        Products
      </a>
      <a
        routerLink="/track"
        routerLinkActive="bg-accent-purple/20 text-accent-purple font-bold"
        class="rounded-full px-5 py-2.5 text-text-secondary font-semibold text-sm transition-all duration-300 hover:bg-accent-purple/10 hover:text-text-primary"
      >
        Track Order
      </a>
    </nav>

    <!-- Search Bar - Minimal -->
    <div class="hidden lg:flex items-center">
      <div role="search" class="relative group">
        <label for="global-search" class="sr-only">Search products</label>
        <input
          id="global-search"
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search..."
          class="w-48 lg:w-56 rounded-full px-5 py-2.5 bg-bg-secondary/50 border border-border text-text-primary placeholder-text-secondary text-sm focus:outline-none focus:ring-2 focus:ring-accent-purple/20 focus:bg-bg-secondary/80 focus:border-accent-purple transition-all duration-300"
        />
        <button
          type="button"
          (click)="search(searchQuery)"
          aria-label="Search"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-text-secondary hover:text-accent-purple transition-colors"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M11 18a7 7 0 100-14 7 7 0 000 14z"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Cart & Auth - Clean -->
    <div class="flex items-center gap-5">
      <!-- Cart Icon -->
      <a routerLink="/cart" class="relative group p-2" aria-label="Cart">
        <svg class="w-6 h-6 text-text-secondary transition-colors group-hover:text-accent-purple" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/>
        </svg>
        <span *ngIf="cartCount > 0" class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-accent-purple text-[10px] font-bold text-white shadow-glow animate-pulse-glow">
          {{ cartCount }}
        </span>
      </a>

      <!-- Auth Links -->
      <div class="hidden sm:flex items-center gap-3">
        <ng-container *ngIf="currentUser as user; else loginLink">
          <div class="flex items-center gap-3">
            <a routerLink="/profile" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
              <div class="w-9 h-9 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold text-sm shadow-glow">
                {{ user.firstName.charAt(0) || 'U' }}
              </div>
              <div class="hidden lg:block text-left relative top-0.5">
                <p class="text-sm font-bold text-navy leading-none">{{ user.firstName }}</p>
                <p *ngIf="user.role === 'admin'" class="text-xs text-primary font-semibold mt-0.5">Admin</p>
              </div>
            </a>
          </div>
          <a routerLink="/orders" class="rounded-full px-4 py-2.5 text-sm font-semibold text-slate-500 hover:text-primary hover:bg-primary/5 transition-all duration-300">
            Orders
          </a>
          <a *ngIf="user.role === 'admin'" (click)="navigateToAdmin()" class="rounded-full bg-navy px-5 py-2.5 text-sm font-bold text-white hover:bg-slate-800 cursor-pointer transition-all duration-300 ml-2">
            Dashboard
          </a>
          <button (click)="logout()" class="rounded-full px-4 py-2.5 text-sm font-semibold text-slate-500 hover:text-navy hover:bg-slate-100 transition-all duration-300">
            Logout
          </button>
        </ng-container>

        <ng-template #loginLink>
          <a routerLink="/login" class="rounded-full px-5 py-2.5 text-sm font-semibold text-slate-600 hover:text-primary hover:bg-primary/5 transition-colors">
            Login
          </a>
          <a routerLink="/register" class="btn-safi-primary shadow-glow px-6 py-2.5 text-sm rounded-full">
            Sign Up
          </a>
        </ng-template>
      </div>

      <!-- Mobile Menu Button -->
      <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-xl hover:bg-slate-100 transition-colors z-50 relative" aria-expanded="{{ showMobileMenu }}">
        <svg *ngIf="!showMobileMenu" class="h-6 w-6 text-navy" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-16 6h16"/>
        </svg>
        <svg *ngIf="showMobileMenu" class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu - Full Screen Slide/Fade In Overlay -->
  <div *ngIf="showMobileMenu" class="fixed inset-0 z-40 bg-navy/95 backdrop-blur-3xl flex flex-col justify-center items-center animate-fade-in transition-all duration-500">
    <div class="space-y-6 w-full max-w-sm px-6 text-center text-xl">
      <a routerLink="/" (click)="toggleMobileMenu()" class="block rounded-2xl px-6 py-4 text-white font-bold hover:bg-white/10 transition-colors">Home</a>
      <a routerLink="/products" (click)="toggleMobileMenu()" class="block rounded-2xl px-6 py-4 text-white font-bold hover:bg-white/10 transition-colors">Products</a>
      <a routerLink="/track" (click)="toggleMobileMenu()" class="block rounded-2xl px-6 py-4 text-white font-bold hover:bg-white/10 transition-colors">Track Order</a>

      <ng-container *ngIf="currentUser as user; else mobileLoginLink">
        <div class="border-t border-slate-700/50 pt-6 mt-6">
          <a routerLink="/profile" (click)="toggleMobileMenu()" class="flex items-center justify-center gap-3 mb-6">
            <div class="w-16 h-16 rounded-full bg-gradient-to-br from-primary to-accent flex items-center justify-center text-white font-bold text-2xl shadow-glow">
              {{ user.firstName.charAt(0) || 'U' }}
            </div>
            <p class="font-black text-white text-2xl">{{ user.firstName }}</p>
          </a>
          <a routerLink="/orders" (click)="toggleMobileMenu()" class="block rounded-full border border-white/20 px-6 py-4 font-bold text-white mb-4 hover:bg-white/10 transition-colors">My Orders</a>
          <a *ngIf="user.role === 'admin'" (click)="navigateToAdmin()" class="block rounded-full bg-primary shadow-glow px-6 py-4 font-bold text-white mb-4">Admin Dashboard</a>
          <button (click)="logout()" class="w-full rounded-full bg-white/10 px-6 py-4 font-bold text-white hover:bg-white/20 transition-colors">Logout</button>
        </div>
      </ng-container>

      <ng-template #mobileLoginLink>
        <div class="border-t border-slate-700/50 pt-6 mt-6 space-y-4">
          <a routerLink="/login" (click)="toggleMobileMenu()" class="block rounded-full border border-white/20 px-6 py-4 text-white font-bold hover:bg-white/10 transition-colors">Login</a>
          <a routerLink="/register" (click)="toggleMobileMenu()" class="block rounded-full bg-primary shadow-glow px-6 py-4 font-bold text-white transition-all duration-300">Sign Up</a>
        </div>
      </ng-template>
    </div>
  </div>
</header>
