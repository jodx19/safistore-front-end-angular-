<div class="page-header">
  <div class="page-header-glass animate-fade-in">
    <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900">Secure Checkout</h1>
    <p class="text-blue-600 mt-2 font-medium">Finalize your premium acquisition</p>
  </div>
</div>

<section class="section-premium reveal">
  <div class="max-w-3xl mx-auto">
    <!-- Order Confirmation -->
    @if (orderPlaced) {
      <div
        class="bg-emerald-50 border-l-4 border-emerald-500 p-8 rounded-3xl shadow-soft animate-fade-in mb-12"
      >
        <h2 class="text-3xl font-black text-emerald-900 mb-4">✓ Order Placed Successfully</h2>
        <div class="bg-white/50 p-6 rounded-2xl">
          <p class="text-slate-600 mb-1 font-medium">
            Tracking Identification: <strong class="text-slate-900 text-lg">{{ orderNumber }}</strong>
          </p>
          <p class="text-slate-500">A detailed confirmation dispatch has been sent to your primary email.</p>
        </div>
        <button routerLink="/" class="btn-primary mt-8">Return to Intelligence Center</button>
      </div>
    }

    <!-- Checkout Form -->
    @if (!orderPlaced) {
      <form class="space-y-12">
        <!-- Shipping Information -->
        <div class="card p-10 shadow-soft-lg space-y-8">
          <h2 class="text-2xl font-black text-slate-900 border-b border-slate-100 pb-4 flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white text-sm">1</span>
            Logistics Destination
          </h2>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">First Name</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.firstName"
                name="firstName"
                placeholder="e.g. John"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Last Name</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.lastName"
                name="lastName"
                placeholder="e.g. Doe"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
          </div>

          <div class="space-y-2">
            <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Primary Email</label>
            <input
              type="email"
              [(ngModel)]="checkoutForm.email"
              name="email"
              placeholder="john@intelligence.com"
              class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
            />
          </div>

          <div class="space-y-2">
            <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Physical Address</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.address"
              name="address"
              placeholder="Main Intelligence St. 123"
              class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">City</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.city"
                name="city"
                placeholder="New York"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Postal Index</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.postalCode"
                name="postalCode"
                placeholder="10001"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Country</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.country"
                name="country"
                placeholder="USA"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
          </div>
        </div>

        <!-- Payment Information -->
        <div class="card p-10 shadow-soft-lg space-y-8">
          <h2 class="text-2xl font-black text-slate-900 border-b border-slate-100 pb-4 flex items-center gap-3">
            <span class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white text-sm">2</span>
            Financial Settlement
          </h2>

          <div class="space-y-2">
            <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Identification Number</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.cardNumber"
              name="cardNumber"
              placeholder="•••• •••• •••• ••••"
              class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none font-black tracking-widest"
            />
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Chronology Limit</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.cardExpiry"
                name="cardExpiry"
                placeholder="MM / YY"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Security Code</label>
              <input
                type="text"
                [(ngModel)]="checkoutForm.cardCVC"
                name="cardCVC"
                placeholder="CVC"
                class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
              />
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="button"
          (click)="submitOrder()"
          class="btn-primary w-full py-6 text-xl"
        >
          Place Acquisition Order
        </button>
      </form>
    }
  </div>
</section>
