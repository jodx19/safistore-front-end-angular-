<div class="min-h-screen bg-gradient-to-b from-cyan-50 to-white py-12">
  <div class="max-w-2xl mx-auto px-4 space-y-6">
    <h1 class="text-4xl font-bold gradient-text mb-6 text-center">Checkout</h1>

    <!-- Order Confirmation -->
    <div
      *ngIf="orderPlaced"
      class="bg-green-50 border-l-4 border-green-500 p-6 rounded-lg shadow-md animate-fadeIn"
    >
      <h2 class="text-2xl font-bold text-green-800 mb-2">✓ Order Placed Successfully!</h2>
      <p class="text-green-700 mb-1">
        Order Number: <strong>{{ orderNumber }}</strong>
      </p>
      <p class="text-green-700">We'll send you a confirmation email shortly.</p>
    </div>

    <!-- Checkout Form -->
    <form *ngIf="!orderPlaced" class="space-y-6">
      <!-- Shipping Information -->
      <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
        <h2 class="text-2xl font-bold text-teal-900 border-b-2 border-cyan-400 pb-2">
          Shipping Information
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">First Name</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.firstName"
              name="firstName"
              placeholder="John"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">Last Name</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.lastName"
              name="lastName"
              placeholder="Doe"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-teal-700 mb-1">Email</label>
          <input
            type="email"
            [(ngModel)]="checkoutForm.email"
            name="email"
            placeholder="john@example.com"
            class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-teal-700 mb-1">Address</label>
          <input
            type="text"
            [(ngModel)]="checkoutForm.address"
            name="address"
            placeholder="123 Main St"
            class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">City</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.city"
              name="city"
              placeholder="New York"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">Postal Code</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.postalCode"
              name="postalCode"
              placeholder="10001"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">Country</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.country"
              name="country"
              placeholder="USA"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
        </div>
      </div>

      <!-- Payment Information -->
      <div class="bg-white p-6 rounded-xl shadow-sm space-y-4">
        <h2 class="text-2xl font-bold text-teal-900 border-b-2 border-cyan-400 pb-2">
          Payment Information
        </h2>

        <div>
          <label class="block text-sm font-semibold text-teal-700 mb-1">Card Number</label>
          <input
            type="text"
            [(ngModel)]="checkoutForm.cardNumber"
            name="cardNumber"
            placeholder="1234 5678 9012 3456"
            class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
          />
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">Expiry Date</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.cardExpiry"
              name="cardExpiry"
              placeholder="MM/YY"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-teal-700 mb-1">CVC</label>
            <input
              type="text"
              [(ngModel)]="checkoutForm.cardCVC"
              name="cardCVC"
              placeholder="123"
              class="w-full px-4 py-2 border border-cyan-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
            />
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="button"
        (click)="submitOrder()"
        class="w-full bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-bold py-3 rounded-xl hover:opacity-90 transition text-lg"
      >
        Place Order
      </button>
    </form>
  </div>
</div>
