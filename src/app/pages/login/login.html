<div class="min-h-screen bg-gradient-to-br from-sky-50 via-blue-50 to-cyan-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 border border-sky-100">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold gradient-text mb-2">SafiStore</h1>
      <p class="text-sky-700">Welcome back! Sign in to your account.</p>
    </div>

    <!-- Success / Error Messages -->
    <div *ngIf="successMessage" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
      {{ successMessage }}
    </div>

    <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>

    <!-- Login Form -->
    <form class="space-y-4" (ngSubmit)="login()" #loginForm="ngForm">
      <div>
        <label for="email" class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required autocomplete="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" />
      </div>

      <div>
        <label for="password" class="block text-sm font-bold text-gray-700 mb-2">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required
          autocomplete="current-password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500" />
      </div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-gradient-to-r from-sky-600 to-sky-700 text-white font-bold py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Register Link -->
    <div class="mt-4 text-center">
      <p class="text-gray-600">Don't have an account?</p>
      <button type="button" (click)="goToRegister()"
        class="w-full mt-2 border-2 border-sky-600 text-sky-600 font-bold py-2 rounded-lg hover:bg-sky-50 transition">
        Create Account
      </button>
    </div>
  </div>
</div>
