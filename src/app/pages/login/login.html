<div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Decorative elements -->
  <div class="absolute top-20 left-20 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-20 right-20 w-96 h-96 bg-blue-400/5 rounded-full blur-3xl"></div>
  
  <div class="bg-white/95 backdrop-blur-xl max-w-md w-full p-8 rounded-3xl relative z-10 shadow-2xl border border-slate-200">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900 mb-2">SafiStore</h1>
      <p class="text-slate-600">Welcome back! Sign in to your account.</p>
    </div>

    <!-- Success / Error Messages -->
    <div *ngIf="successMessage" class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-xl mb-4">
      {{ successMessage }}
    </div>

    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4">
      {{ error }}
    </div>

    <!-- Login Form -->
    <form class="space-y-5" (ngSubmit)="login()" #loginForm="ngForm">
      <div>
        <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required autocomplete="email"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" 
          placeholder="your@email.com" />
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required
          autocomplete="current-password"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400"
          placeholder="••••••••" />
      </div>

      <button type="submit" [disabled]="loading"
        class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-xl hover:bg-blue-500 transition-all duration-300 disabled:opacity-50 shadow-lg shadow-blue-500/25">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <!-- Register Link -->
    <div class="mt-6 text-center">
      <p class="text-slate-500 mb-3">Don't have an account?</p>
      <button type="button" (click)="goToRegister()"
        class="w-full border-2 border-slate-200 text-slate-700 font-semibold py-3 rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-all duration-300">
        Create Account
      </button>
    </div>
  </div>
</div>
