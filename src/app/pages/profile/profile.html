<div class="page-header">
  <div class="page-header-glass animate-fade-in">
    <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900">My Profile</h1>
    <p class="text-blue-600 mt-2 font-medium">Manage your account settings</p>
  </div>
</div>

<section class="section-premium reveal">
  <div class="max-w-4xl mx-auto">
    @if (isLoading) {
      <div class="flex items-center justify-center py-20">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600"></div>
      </div>
    } @else {
      <div class="space-y-8">
        <!-- Profile Information -->
        <div class="card p-10 shadow-soft-lg">
          <h2 class="text-2xl font-black text-slate-900 mb-8 flex items-center gap-3">
            <span class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </span>
            Personal Information
          </h2>

          <form (ngSubmit)="updateProfile()" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">First Name</label>
                <input
                  type="text"
                  [(ngModel)]="profileForm.firstName"
                  name="firstName"
                  class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  required
                />
              </div>
              <div class="space-y-2">
                <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Last Name</label>
                <input
                  type="text"
                  [(ngModel)]="profileForm.lastName"
                  name="lastName"
                  class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  required
                />
              </div>
            </div>

            <div class="space-y-2">
              <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Email</label>
              <input
                type="email"
                [(ngModel)]="profileForm.email"
                name="email"
                disabled
                class="w-full px-5 py-3 border border-slate-200 rounded-xl bg-slate-50 text-slate-500 cursor-not-allowed"
              />
              <p class="text-xs text-slate-500">Email cannot be changed</p>
            </div>

            <div class="border-t border-slate-200 pt-6 mt-6">
              <h3 class="text-lg font-bold text-slate-900 mb-4">Address Information</h3>
              
              <div class="space-y-4">
                <div class="space-y-2">
                  <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Street Address</label>
                  <input
                    type="text"
                    [(ngModel)]="profileForm.address"
                    name="address"
                    placeholder="123 Main Street"
                    class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  />
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div class="space-y-2">
                    <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">City</label>
                    <input
                      type="text"
                      [(ngModel)]="profileForm.city"
                      name="city"
                      placeholder="New York"
                      class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                    />
                  </div>
                  <div class="space-y-2">
                    <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Postal Code</label>
                    <input
                      type="text"
                      [(ngModel)]="profileForm.postalCode"
                      name="postalCode"
                      placeholder="10001"
                      class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                    />
                  </div>
                  <div class="space-y-2">
                    <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Country</label>
                    <input
                      type="text"
                      [(ngModel)]="profileForm.country"
                      name="country"
                      placeholder="USA"
                      class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="flex gap-4 pt-4">
              <button
                type="submit"
                [disabled]="isUpdating"
                class="btn-primary flex-1 disabled:opacity-50 disabled:cursor-not-allowed"
              >
                @if (isUpdating) {
                  <span class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Updating...
                  </span>
                } @else {
                  Update Profile
                }
              </button>
            </div>
          </form>
        </div>

        <!-- Password Change Section -->
        <div class="card p-10 shadow-soft-lg">
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-black text-slate-900 flex items-center gap-3">
              <span class="w-10 h-10 rounded-lg bg-purple-600 flex items-center justify-center text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
              </span>
              Security
            </h2>
            <button
              type="button"
              (click)="showPasswordForm = !showPasswordForm"
              class="text-blue-600 hover:text-blue-700 font-bold text-sm"
            >
              {{ showPasswordForm ? 'Cancel' : 'Change Password' }}
            </button>
          </div>

          @if (showPasswordForm) {
            <form (ngSubmit)="changePassword()" class="space-y-6 border-t border-slate-200 pt-6">
              <div class="space-y-2">
                <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Current Password</label>
                <input
                  type="password"
                  [(ngModel)]="passwordForm.currentPassword"
                  name="currentPassword"
                  class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  required
                />
              </div>

              <div class="space-y-2">
                <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">New Password</label>
                <input
                  type="password"
                  [(ngModel)]="passwordForm.newPassword"
                  name="newPassword"
                  class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  required
                />
                <p class="text-xs text-slate-500">Must be at least 8 characters</p>
              </div>

              <div class="space-y-2">
                <label class="block text-slate-900 font-bold text-sm uppercase tracking-wider">Confirm New Password</label>
                <input
                  type="password"
                  [(ngModel)]="passwordForm.confirmPassword"
                  name="confirmPassword"
                  class="w-full px-5 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all outline-none"
                  required
                />
              </div>

              <button
                type="submit"
                [disabled]="isChangingPassword"
                class="btn-primary w-full disabled:opacity-50 disabled:cursor-not-allowed"
              >
                @if (isChangingPassword) {
                  <span class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Changing Password...
                  </span>
                } @else {
                  Change Password
                }
              </button>
            </form>
          } @else {
            <p class="text-slate-500">Keep your account secure by using a strong password</p>
          }
        </div>

        <!-- Account Actions -->
        <div class="card p-10 shadow-soft-lg">
          <h2 class="text-2xl font-black text-slate-900 mb-6 flex items-center gap-3">
            <span class="w-10 h-10 rounded-lg bg-red-600 flex items-center justify-center text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
            </span>
            Account Actions
          </h2>

          <div class="flex flex-col sm:flex-row gap-4">
            <button
              type="button"
              routerLink="/orders"
              class="btn-secondary flex-1"
            >
              View My Orders
            </button>
            <button
              type="button"
              (click)="logout()"
              class="px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-colors"
            >
              Logout
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</section>
