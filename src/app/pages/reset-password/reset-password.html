<div class="min-h-screen flex items-center justify-center bg-[#050B18] relative overflow-hidden py-12 px-4">
  <!-- Background glow orbs -->
  <div class="absolute w-[600px] h-[600px] rounded-full bg-[rgba(74,108,247,0.12)] 
       blur-[120px] -top-48 -left-48 pointer-events-none animate-pulse-slow"></div>
  <div class="absolute w-[500px] h-[500px] rounded-full bg-[rgba(106,61,232,0.1)] 
       blur-[100px] top-1/2 -right-24 pointer-events-none animate-drift"></div>

  <div class="max-w-md w-full relative z-10 bg-[#0D1F3C]/60 backdrop-blur-xl border border-white/5 rounded-3xl p-8 shadow-2xl">
    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-4xl mb-4">🔐</div>
      <h1 class="text-2xl font-black text-white">Reset Password</h1>
      <p class="text-slate-400 text-sm mt-2">Create a new secure password for your account</p>
    </div>

    <!-- Success State -->
    <div *ngIf="isSuccess" class="text-center">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-[#10B981]/15 border border-[#10B981]/30 flex items-center justify-center">
        <svg class="w-8 h-8 text-[#10B981]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-white mb-2">Password Updated!</h2>
      <p class="text-slate-400 mb-4">Your password has been reset successfully.</p>
      <p class="text-sm text-[#6C4FF6] font-semibold animate-pulse">Redirecting to login...</p>
    </div>

    <!-- Reset Form -->
    <form *ngIf="!isSuccess" (ngSubmit)="resetPassword()" class="space-y-5">
      <!-- Email Display -->
      <div>
        <label class="block text-slate-400 text-sm font-semibold mb-2">Email Address</label>
        <input 
          type="email" 
          [value]="email" 
          disabled 
          class="w-full bg-white/5 border border-white/5 rounded-xl px-5 py-3 text-slate-400 cursor-not-allowed outline-none"
        >
      </div>

      <!-- New Password -->
      <div>
        <label class="block text-slate-400 text-sm font-semibold mb-2">
          New Password <span class="text-[#EF4444]">*</span>
        </label>
        <input 
          type="password" 
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Enter new password"
          required
          class="w-full bg-white/5 border border-white/5 rounded-xl px-5 py-3 text-white placeholder-slate-500 outline-none focus:border-[#6C4FF6]/40 focus:bg-white/10 transition-all"
          [ngClass]="{'border-[#10B981]/50 focus:border-[#10B981]': newPassword.length > 0 && isPasswordValid, 'border-[#EF4444]/50 focus:border-[#EF4444]': newPassword.length > 0 && !isPasswordValid}"
        >
        <div *ngIf="newPassword.length > 0 && !isPasswordValid" class="mt-2 text-xs text-[#EF4444]">
          Must contain: 8+ chars, 1 uppercase, 1 number, 1 special character
        </div>
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-slate-400 text-sm font-semibold mb-2">
          Confirm Password <span class="text-[#EF4444]">*</span>
        </label>
        <input 
          type="password" 
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm new password"
          required
          class="w-full bg-white/5 border border-white/5 rounded-xl px-5 py-3 text-white placeholder-slate-500 outline-none focus:border-[#6C4FF6]/40 focus:bg-white/10 transition-all"
          [ngClass]="{'border-[#10B981]/50 focus:border-[#10B981]': confirmPassword.length > 0 && doPasswordsMatch, 'border-[#EF4444]/50 focus:border-[#EF4444]': confirmPassword.length > 0 && !doPasswordsMatch}"
        >
        <div *ngIf="confirmPassword.length > 0 && !doPasswordsMatch" class="mt-2 text-xs text-[#EF4444]">
          Passwords do not match
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="loading || !newPassword || !confirmPassword"
        class="w-full bg-gradient-to-r from-[#6C4FF6] to-[#3B82F6] text-white font-bold px-6 py-3 rounded-xl hover:opacity-90 transition-all shadow-[0_0_20px_rgba(108,79,246,0.4)] disabled:opacity-50 mt-4 flex justify-center items-center gap-2"
      >
        <span *ngIf="loading">
           <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
             <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
             <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
           </svg>
        </span>
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading">Processing...</span>
      </button>

      <!-- Back to Login -->
      <div class="text-center mt-6">
        <a routerLink="/login" class="text-[#6C4FF6] hover:text-[#3B82F6] font-bold text-sm transition-colors">← Back to Login</a>
      </div>
    </form>
  </div>
</div>
