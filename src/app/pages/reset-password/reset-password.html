<div class="reset-password-container">
  <div class="reset-card">
    <!-- Header -->
    <div class="reset-header">
      <div class="lock-icon">🔐</div>
      <h1>Reset Password</h1>
      <p>Create a new secure password for your account</p>
    </div>

    <!-- Success State -->
    <div *ngIf="isSuccess" class="success-state">
      <div class="success-icon">✅</div>
      <h2>Password Updated!</h2>
      <p>Your password has been reset successfully.</p>
      <p class="redirect-text">Redirecting to login...</p>
    </div>

    <!-- Reset Form -->
    <form *ngIf="!isSuccess" (ngSubmit)="resetPassword()" class="reset-form">
      <!-- Email Display -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          [value]="email" 
          disabled 
          class="form-input disabled-input"
        >
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">
          New Password
          <span class="required">*</span>
        </label>
        <input 
          type="password" 
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Enter new password"
          required
          class="form-input"
          [class.input-valid]="isPasswordValid"
          [class.input-invalid]="newPassword.length > 0 && !isPasswordValid"
        >
        <div *ngIf="newPassword.length > 0 && !isPasswordValid" class="validation-hint">
          <small>Must contain: 8+ chars, 1 uppercase, 1 number, 1 special character</small>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">
          Confirm Password
          <span class="required">*</span>
        </label>
        <input 
          type="password" 
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Confirm new password"
          required
          class="form-input"
          [class.input-valid]="doPasswordsMatch"
          [class.input-invalid]="confirmPassword.length > 0 && !doPasswordsMatch"
        >
        <div *ngIf="confirmPassword.length > 0 && !doPasswordsMatch" class="validation-hint error">
          <small>Passwords do not match</small>
        </div>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        [disabled]="loading || !newPassword || !confirmPassword"
        class="submit-btn"
      >
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Reset Password</span>
        <span *ngIf="loading">Processing...</span>
      </button>

      <!-- Back to Login -->
      <div class="back-link">
        <a routerLink="/login">← Back to Login</a>
      </div>
    </form>
  </div>
</div>
