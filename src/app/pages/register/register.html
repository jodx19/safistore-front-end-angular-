<div
  class="min-h-screen bg-gradient-to-br from-sky-50 via-blue-50 to-cyan-50 flex items-center justify-center p-4 py-12"
>
  <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 border border-sky-100">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold gradient-text mb-2">ProStore</h1>
      <p class="text-sky-700">Create your account</p>
    </div>

    <!-- Success Message -->
    <div
      *ngIf="successMessage"
      class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
    >
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
      {{ error }}
    </div>

    <!-- Register Form -->
    <form class="space-y-4">
      <!-- First Name -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">First Name</label>
        <input
          type="text"
          [(ngModel)]="firstName"
          name="firstName"
          placeholder="John"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Last Name -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Last Name</label>
        <input
          type="text"
          [(ngModel)]="lastName"
          name="lastName"
          placeholder="Doe"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-2">Confirm Password</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <!-- Terms Checkbox -->
      <div class="flex items-center">
        <input
          type="checkbox"
          [(ngModel)]="agreeToTerms"
          name="agreeToTerms"
          class="w-4 h-4 text-purple-600"
        />
        <label class="ml-2 text-sm text-gray-700">
          I agree to the
          <a href="#" class="text-purple-600 font-bold">Terms and Conditions</a>
        </label>
      </div>

      <!-- Register Button -->
      <button
        type="button"
        (click)="register()"
        [disabled]="loading"
        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white font-bold py-3 rounded-lg hover:opacity-90 transition disabled:opacity-50"
      >
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-gray-500">Already have an account?</span>
      </div>
    </div>

    <!-- Login Link -->
    <button
      type="button"
      (click)="goToLogin()"
      class="w-full border-2 border-purple-600 text-purple-600 font-bold py-2 rounded-lg hover:bg-purple-50 transition"
    >
      Sign In
    </button>
  </div>
</div>
