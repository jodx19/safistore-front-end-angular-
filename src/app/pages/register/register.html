<div class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4 py-12 relative overflow-hidden">
  <!-- Decorative elements -->
  <div class="absolute top-20 left-20 w-72 h-72 bg-blue-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-20 right-20 w-96 h-96 bg-blue-400/5 rounded-full blur-3xl"></div>
  
  <div class="bg-white/95 backdrop-blur-xl max-w-md w-full p-8 rounded-3xl relative z-10 shadow-2xl border border-slate-200">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-slate-900 mb-2">SafiStore</h1>
      <p class="text-slate-600">Create your account</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-xl mb-4">
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4">
      {{ error }}
    </div>

    <!-- Register Form -->
    <form class="space-y-4">
      <!-- First Name -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">First Name</label>
        <input type="text" [(ngModel)]="firstName" name="firstName" placeholder="John"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" />
      </div>

      <!-- Last Name -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Last Name</label>
        <input type="text" [(ngModel)]="lastName" name="lastName" placeholder="Doe"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" />
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="your@email.com"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" />
      </div>

      <!-- Confirm Password -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••"
          class="w-full px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-slate-900 placeholder-slate-400" />
      </div>

      <!-- Terms Checkbox -->
      <div class="flex items-center">
        <input type="checkbox" [(ngModel)]="agreeToTerms" name="agreeToTerms" class="w-4 h-4 accent-blue-600 rounded" />
        <label class="ml-2 text-sm text-slate-600">
          I agree to the
          <a href="#" class="text-blue-600 font-semibold hover:underline">Terms and Conditions</a>
        </label>
      </div>

      <!-- Register Button -->
      <button type="button" (click)="register()" [disabled]="loading"
        class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-xl hover:bg-blue-500 transition-all duration-300 disabled:opacity-50 shadow-lg shadow-blue-500/25">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-slate-200"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-3 bg-white text-slate-500">Already have an account?</span>
      </div>
    </div>

    <!-- Login Link -->
    <button type="button" (click)="goToLogin()"
      class="w-full border-2 border-slate-200 text-slate-700 font-semibold py-3 rounded-xl hover:bg-slate-50 hover:border-slate-300 transition-all duration-300">
      Sign In
    </button>
  </div>
</div>
