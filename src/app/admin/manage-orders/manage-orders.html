<div class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-4xl font-bold text-sky-900 mb-8">Manage Orders</h1>

  <div class="bg-white p-6 rounded-lg shadow">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b-2 border-sky-200">
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Order ID</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Customer</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Total</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Status</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Date</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let order of orders"
            class="border-b border-sky-100 hover:bg-sky-50 transition"
          >
            <td class="py-3 px-4 font-bold">{{ order.id }}</td>
            <td class="py-3 px-4">{{ order.customer }}</td>
            <td class="py-3 px-4 font-bold">${{ order.total }}</td>
            <td class="py-3 px-4">
              <span
                [ngClass]="getStatusColor(order.status)"
                class="px-3 py-1 rounded-full text-sm font-bold capitalize"
              >
                {{ order.status }}
              </span>
            </td>
            <td class="py-3 px-4">{{ order.date }}</td>
            <td class="py-3 px-4">
              <select
                (change)="updateStatus(order, $event)"
                [value]="order.status"
                class="px-3 py-1 border border-sky-200 rounded text-sm"
              >
                <option value="pending">Pending</option>
                <option value="confirmed">Confirmed</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
              </select>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
