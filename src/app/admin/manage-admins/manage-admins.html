<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-4xl font-bold text-sky-900">Manage Admins</h1>
    <button (click)="showForm = !showForm"
      class="bg-sky-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-sky-700">
      {{ showForm ? 'Cancel' : 'Add New Admin' }}
    </button>
  </div>

  <!-- Messages -->
  <div *ngIf="success" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
    {{ success }}
  </div>
  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>

  <!-- Add Admin Form -->
  <div *ngIf="showForm" class="bg-white p-6 rounded-lg shadow mb-8">
    <h2 class="text-2xl font-bold text-sky-900 mb-4">Add New Admin</h2>
    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sky-900 font-bold mb-2">Email</label>
        <input type="email" [(ngModel)]="newAdmin.email" name="email"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Enter email" />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">First Name</label>
        <input type="text" [(ngModel)]="newAdmin.firstName" name="firstName"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="First name" />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">Last Name</label>
        <input type="text" [(ngModel)]="newAdmin.lastName" name="lastName"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Last name" />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">Password</label>
        <input type="password" [(ngModel)]="newAdmin.password" name="password"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Password" />
      </div>
      <button type="button" (click)="addNewAdmin()" [disabled]="loading"
        class="md:col-span-2 bg-sky-600 text-white font-bold py-2 rounded-lg hover:bg-sky-700 disabled:opacity-50">
        {{ loading ? 'Adding...' : 'Add Admin' }}
      </button>
    </form>
  </div>

  <!-- Admins List -->
  <div class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-2xl font-bold text-sky-900 mb-4">Admins</h2>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b-2 border-sky-200">
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Email</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Name</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Role</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let admin of admins" class="border-b border-sky-100 hover:bg-sky-50 transition">
            <td class="py-3 px-4">{{ admin.email }}</td>
            <td class="py-3 px-4">{{ admin.firstName }} {{ admin.lastName }}</td>
            <td class="py-3 px-4">
              <span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 text-sm font-bold">
                {{ admin.role }}
              </span>
            </td>
            <td class="py-3 px-4">
              <button (click)="removeAdmin(admin.email)" class="text-red-600 hover:text-red-900 font-bold">
                Remove
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
