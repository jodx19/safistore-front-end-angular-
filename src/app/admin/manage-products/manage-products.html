<div class="max-w-7xl mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-8">
    <h1 class="text-4xl font-bold text-sky-900">Manage Products</h1>
    <button
      (click)="showForm = !showForm"
      class="bg-sky-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-sky-700"
    >
      {{ showForm ? 'Cancel' : 'Add New Product' }}
    </button>
  </div>

  <!-- Messages -->
  <div
    *ngIf="success"
    class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4"
  >
    {{ success }}
  </div>
  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>

  <!-- Add/Edit Product Form -->
  <div *ngIf="showForm" class="bg-white p-6 rounded-lg shadow mb-8">
    <h2 class="text-2xl font-bold text-sky-900 mb-4">
      {{ editingProduct ? 'Edit Product' : 'Add New Product' }}
    </h2>
    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sky-900 font-bold mb-2">Product Name</label>
        <input
          type="text"
          [(ngModel)]="newProduct.title"
          name="title"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Enter product name"
        />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">Price</label>
        <input
          type="number"
          [(ngModel)]="newProduct.price"
          name="price"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Enter price"
        />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">Stock</label>
        <input
          type="number"
          [(ngModel)]="newProduct.stock"
          name="stock"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Enter stock"
        />
      </div>
      <div>
        <label class="block text-sky-900 font-bold mb-2">Category</label>
        <select
          [(ngModel)]="newProduct.category"
          name="category"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
        >
          <option value="">Select Category</option>
          <option *ngFor="let cat of categories" [value]="cat">
            {{ cat }}
          </option>
        </select>
      </div>
      <div class="md:col-span-2">
        <label class="block text-sky-900 font-bold mb-2">Description</label>
        <textarea
          [(ngModel)]="newProduct.description"
          name="description"
          rows="3"
          class="w-full px-4 py-2 border border-sky-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-500"
          placeholder="Enter description"
        ></textarea>
      </div>
      <div class="md:col-span-2 flex gap-4">
        <button
          *ngIf="!editingProduct"
          type="button"
          (click)="addProduct()"
          [disabled]="loading"
          class="flex-1 bg-sky-600 text-white font-bold py-2 rounded-lg hover:bg-sky-700 disabled:opacity-50"
        >
          Add Product
        </button>
        <button
          *ngIf="editingProduct"
          type="button"
          (click)="saveEdit()"
          [disabled]="loading"
          class="flex-1 bg-sky-600 text-white font-bold py-2 rounded-lg hover:bg-sky-700 disabled:opacity-50"
        >
          Save Changes
        </button>
        <button
          *ngIf="editingProduct"
          type="button"
          (click)="cancelEdit()"
          class="flex-1 border-2 border-sky-600 text-sky-600 font-bold py-2 rounded-lg hover:bg-sky-50"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>

  <!-- Products Table -->
  <div class="bg-white p-6 rounded-lg shadow">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr class="border-b-2 border-sky-200">
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Product Name</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Price</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Stock</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Category</th>
            <th class="text-left py-3 px-4 text-sky-900 font-bold">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let product of products"
            class="border-b border-sky-100 hover:bg-sky-50 transition"
          >
            <td class="py-3 px-4">{{ product.title }}</td>
            <td class="py-3 px-4">${{ product.price }}</td>
            <td class="py-3 px-4">
              <span
                [ngClass]="
                  product.stock > 20
                    ? 'bg-green-100 text-green-800'
                    : 'bg-yellow-100 text-yellow-800'
                "
                class="px-3 py-1 rounded-full text-sm font-bold"
              >
                {{ product.stock }}
              </span>
            </td>
            <td class="py-3 px-4">{{ product.category }}</td>
            <td class="py-3 px-4 space-x-2">
              <button
                (click)="editProduct(product)"
                class="text-blue-600 hover:text-blue-900 font-bold"
              >
                Edit
              </button>
              <button
                (click)="deleteProduct(product.id)"
                class="text-red-600 hover:text-red-900 font-bold"
              >
                Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
