<div
  class="w-full max-w-[280px] bg-[rgba(17,31,56,0.8)] border border-[rgba(255,255,255,0.07)] rounded-2xl overflow-hidden transition-all duration-300 cursor-pointer group"
  [style.animation]="'fadeUp 0.6s ease-out forwards'"
  [style.animationDelay.s]="animDelay"
>
  <!-- Image area -->
  <div class="relative aspect-square overflow-hidden bg-[rgba(255,255,255,0.03)]">
    <img
      [ngSrc]="product.image"
      alt="{{ product.name }}"
      class="w-full h-full object-contain p-5 transition-transform duration-500 group-hover:scale-[1.08]"
      loading="lazy"
    />

    <div
      *ngIf="discountLabel"
      class="absolute left-0 top-0 bg-gradient-to-br from-red-500 to-red-600 text-white text-[13px] font-bold font-display px-3 py-1.5 rounded-br-xl"
    >
      {{ discountLabel }}
    </div>

    <div
      *ngIf="product.badge"
      class="absolute right-3 top-3 text-[11px] px-2.5 py-1 rounded-full bg-[rgba(14,165,233,0.15)] text-brand-sky uppercase tracking-[0.12em] font-semibold"
    >
      {{ product.badge }}
    </div>

    <!-- Quick actions -->
    <div
      class="absolute left-0 right-0 bottom-0 translate-y-full group-hover:translate-y-0 transition-transform duration-300"
    >
      <div
        class="flex items-center gap-2 px-3 py-3 bg-[rgba(10,22,40,0.9)] backdrop-blur-md"
      >
        <button
          type="button"
          class="flex-1 h-9 rounded-xl bg-gradient-to-r from-brand-blue to-brand-purple text-[13px] font-medium text-white flex items-center justify-center gap-1.5"
          (click)="addToCart.emit(product)"
        >
          <span>Add to Cart</span>
        </button>

        <button
          type="button"
          class="w-9 h-9 rounded-xl border border-[rgba(255,255,255,0.1)] flex items-center justify-center text-[rgba(255,255,255,0.7)] hover:text-red-400 hover:border-red-400 transition-colors"
          (click)="addToWishlist.emit(product)"
        >
          <svg
            viewBox="0 0 24 24"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path
              d="M12.1 5.05 12 5a5.5 5.5 0 0 0-7.78 7.78l7.4 7.4a.85.85 0 0 0 1.2 0l7.4-7.4A5.5 5.5 0 0 0 12.1 5.05Z"
            />
          </svg>
        </button>

        <button
          type="button"
          class="w-9 h-9 rounded-xl border border-[rgba(255,255,255,0.1)] flex items-center justify-center text-[rgba(255,255,255,0.7)] hover:text-brand-sky hover:border-brand-sky transition-colors"
        >
          <svg
            viewBox="0 0 24 24"
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path d="M4 9h16l-3 4H7z" />
            <path d="M4 15h16" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="px-5 pb-5 pt-4">
    <p
      class="text-[11px] font-semibold tracking-[0.18em] uppercase text-brand-blue mb-1"
    >
      {{ product.category }}
    </p>

    <h3 class="text-[17px] font-display font-semibold text-white leading-snug mb-2">
      {{ product.name }}
    </h3>

    <div class="flex items-center text-[12px] text-[rgba(255,255,255,0.4)] gap-1">
      <span class="text-amber-400">
        ★★★★★
      </span>
      <span>({{ product.rating | number : '1.1-1' }})</span>
      <span class="mx-1 text-[rgba(255,255,255,0.25)]">•</span>
      <span>{{ product.reviews }} reviews</span>
    </div>

    <div class="flex items-center justify-between mt-3">
      <div>
        <div
          *ngIf="product.originalPrice && product.originalPrice > product.price"
          class="text-[13px] text-[rgba(255,255,255,0.3)] line-through"
        >
          {{ product.originalPrice | currency : 'USD' : 'symbol' : '1.0-0' }}
        </div>
        <div
          class="text-[22px] font-display font-extrabold text-white leading-none mt-0.5"
        >
          {{ product.price | currency : 'USD' : 'symbol' : '1.0-0' }}
        </div>
      </div>

      <button
        type="button"
        class="w-9 h-9 rounded-full bg-gradient-to-r from-brand-blue to-brand-purple flex items-center justify-center text-white shadow-[0_0_25px_rgba(74,108,247,0.65)] hover:scale-110 transition-transform"
        (click)="addToCart.emit(product)"
      >
        <svg
          viewBox="0 0 24 24"
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="10" cy="20" r="1.5" />
          <circle cx="18" cy="20" r="1.5" />
          <path
            d="M4 4h2l2.5 11h10l2-8H7.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>
  </div>
</div>
